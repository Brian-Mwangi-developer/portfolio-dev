name: Melduo Deploy

on:
  push:
    branches:
      - "main"
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    name: Build & Deploy Portfolio
    runs-on: ubuntu-latest

    permissions:
      id-token: write
      contents: read

    steps:
      # ── Checkout ────────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Debug OIDC claims
        run: |
          curl -sS -H "Authorization: bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" \
            "$ACTIONS_ID_TOKEN_REQUEST_URL&audience=sts.amazonaws.com" \
            | jq -r '.value' | cut -d. -f2 | base64 -d 2>/dev/null | jq .

      # ── AWS credentials (OIDC) ───────────────────────────────────────────────
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::847460071934:role/MelduoOidc-cmrkkzef
          aws-region: us-east-1

      # ── Set up Bun ───────────────────────────────────────────────────────────
      - name: Set up Bun
        uses: oven-sh/setup-bun@v2

      # ── Set up Node.js ───────────────────────────────────────────────────────
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      # ── Install app dependencies ─────────────────────────────────────────────
      - name: Install app dependencies
        run: bun install

      # ── Build Next.js static export ─────────────────────────────────────────
      - name: Build Next.js static export
        run: bun run build

      # ── Bootstrap CDK ────────────────────────────────────────────────────────
      - name: CDK Bootstrap
        working-directory: infra
        run: |
          npm ci
          npx cdk bootstrap aws://847460071934/us-east-1

      # ── Deploy CDK stack (creates S3 bucket + CloudFront) ────────────────────
      - name: CDK Deploy
        working-directory: infra
        run: npx cdk deploy --require-approval never --outputs-file cdk-outputs.json

      # ── Read CDK outputs ─────────────────────────────────────────────────────
      - name: Read CDK outputs
        id: cdk_outputs
        working-directory: infra
        run: |
          BUCKET=$(jq -r '.["melduo-app-cmrbfl5w"].BucketName' cdk-outputs.json)
          DIST_ID=$(jq -r '.["melduo-app-cmrbfl5w"].DistributionId' cdk-outputs.json)
          APP_URL=$(jq -r '.["melduo-app-cmrbfl5w"].AppUrl' cdk-outputs.json)
          echo "bucket=$BUCKET" >> "$GITHUB_OUTPUT"
          echo "distribution_id=$DIST_ID" >> "$GITHUB_OUTPUT"
          echo "app_url=$APP_URL" >> "$GITHUB_OUTPUT"

      # ── Sync static assets to S3 ─────────────────────────────────────────────
      - name: Sync to S3
        run: |
          aws s3 sync out/ s3://${{ steps.cdk_outputs.outputs.bucket }}/ \
            --delete \
            --cache-control "public,max-age=31536000,immutable" \
            --exclude "*.html" \
            --exclude "*.json"
          # HTML and JSON get short TTL so updates are visible immediately
          aws s3 sync out/ s3://${{ steps.cdk_outputs.outputs.bucket }}/ \
            --delete \
            --cache-control "public,max-age=0,must-revalidate" \
            --include "*.html" \
            --include "*.json"

      # ── Invalidate CloudFront cache ───────────────────────────────────────────
      - name: Invalidate CloudFront cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ steps.cdk_outputs.outputs.distribution_id }} \
            --paths "/*"

      # ── Summary ──────────────────────────────────────────────────────────────
      - name: Deployment summary
        run: |
          echo "### 🚀 Portfolio deployed successfully!" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "**URL:** ${{ steps.cdk_outputs.outputs.app_url }}" >> "$GITHUB_STEP_SUMMARY"
